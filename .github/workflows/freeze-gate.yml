name: freeze-gate
# Daily freeze-gate run (W3.4 / KAC-178).
# Executes scripts/freeze-gate/run-all.sh and, when any check fails or crashes,
# creates or updates a tracking GitHub Issue in this repo with label `freeze-gate`.

on:
  schedule:
    - cron: '0 8 * * *'  # 08:00 UTC daily
  workflow_dispatch: {}
  push:
    paths:
      - 'scripts/freeze-gate/**'
      - '.github/workflows/freeze-gate.yml'

permissions:
  contents: read
  issues: write

jobs:
  run-freeze-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install jq (for vault dashboard generation)
        run: sudo apt-get update -qq && sudo apt-get install -y jq

      - name: run freeze gate
        id: gate
        env:
          KACHO_FREEZE_OUTPUT_JSON: ${{ github.workspace }}/freeze-report.json
          # Heavy go-test coverage check is skipped in cron: it requires every
          # sibling repo cloned + DB. Local maintainers can run it on demand.
          KACHO_FREEZE_COVERAGE_SKIP: '1'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          ./scripts/freeze-gate/run-all.sh
          rc=$?
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          exit 0  # never fail the job; outcome is encoded as Issue + dashboard

      - name: regenerate vault dashboard
        if: always()
        run: |
          ./scripts/freeze-gate/update-vault.sh freeze-report.json

      - name: upload artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: freeze-gate-report
          path: |
            freeze-report.json
            obsidian/kacho/freeze-gate-status.md

      - name: ensure freeze-gate label exists
        if: steps.gate.outputs.rc != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Idempotent: label may already exist.
          gh label create freeze-gate \
            --color d93f0b \
            --description "Freeze gate (W3.4 / KAC-178) tracking issue" \
            || true

      - name: open / update tracking issue on failure
        if: steps.gate.outputs.rc != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          FAIL=$(jq -r '.totals.fail' freeze-report.json)
          CRASH=$(jq -r '.totals.crash' freeze-report.json)
          SKIP=$(jq -r '.totals.skip' freeze-report.json)
          TOTAL=$(jq -r '.totals.total' freeze-report.json)
          PASS=$(jq -r '.totals.pass' freeze-report.json)
          FAILING=$(( FAIL + CRASH ))

          TITLE="[FREEZE-GATE] ${DATE}: ${FAILING} failing check(s)"
          BODY=$(mktemp)
          {
            echo "Freeze gate run on ${DATE} flagged **${FAILING}** failing check(s)."
            echo
            echo "- Total: ${TOTAL}"
            echo "- Pass:  ${PASS}"
            echo "- Fail:  ${FAIL}"
            echo "- Skip:  ${SKIP}"
            echo "- Crash: ${CRASH}"
            echo
            echo "### Per-check status"
            echo
            echo "| Check | Status | Detail |"
            echo "|---|---|---|"
            jq -r '.checks[] | "| \(.name) | \(.status) | \(.detail) |"' freeze-report.json
            echo
            echo "Generated by \`.github/workflows/freeze-gate.yml\` (KAC-178)."
            echo
            echo "Spec: \`docs/specs/sub-phase-W3.4-freeze-checklist-acceptance.md\`."
          } > "$BODY"

          # Idempotent open-or-update: find existing open issue with label `freeze-gate`.
          EXISTING=$(gh issue list --label freeze-gate --state open --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            echo "updating existing freeze-gate issue #${EXISTING}"
            gh issue edit "$EXISTING" --title "$TITLE" --body-file "$BODY"
            gh issue comment "$EXISTING" --body "Re-run on ${DATE}: ${FAILING} failing check(s)."
          else
            echo "creating new freeze-gate issue"
            gh issue create --title "$TITLE" --body-file "$BODY" --label freeze-gate
          fi

      - name: close tracking issue on full pass
        if: steps.gate.outputs.rc == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          EXISTING=$(gh issue list --label freeze-gate --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            DATE=$(date -u +%Y-%m-%d)
            gh issue comment "$EXISTING" --body "Freeze gate fully green on ${DATE}. Closing."
            gh issue close "$EXISTING"
          fi
